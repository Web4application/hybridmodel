<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blossom Counter</title>

    <script type="importmap">
      {
        "imports": {
          "preact": "https://unpkg.com/preact@10.25.4/dist/preact.module.js",
          "preact/hooks": "https://unpkg.com/preact@10.25.4/hooks/dist/hooks.module.js",
          "htm": "https://unpkg.com/htm@3.1.1/dist/htm.module.js"
        }
      }
    </script>

    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --accent: #22c55e;
        --text: #e5e7eb;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #020617);
        color: var(--text);
        display: grid;
        place-items: center;
        height: 100vh;
      }

      .card {
        background: var(--card);
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        text-align: center;
        min-width: 260px;
      }

      .count {
        font-size: 3rem;
        margin: 1rem 0;
        color: var(--accent);
      }

      button {
        background: var(--accent);
        border: none;
        padding: 0.7rem 1.2rem;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.1s ease, opacity 0.2s;
      }

      button:hover {
        opacity: 0.9;
      }

      button:active {
        transform: scale(0.95);
      }

      .actions {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1rem;
      }
    </style>
  </head>

  <body>
    <script type="module">
      import { h, render } from "preact";
      import { useState, useEffect } from "preact/hooks";
      import htm from "htm";

      const html = htm.bind(h);

      function Counter() {
        const [count, setCount] = useState(0);

        // subtle lifecycle flavor
        useEffect(() => {
          document.title = `Count: ${count}`;
        }, [count]);

        const increment = () => setCount(c => c + 1);
        const decrement = () => setCount(c => c - 1);
        const reset = () => setCount(0);

        return html`
          <div class="card">
            <h2>Blossom Counter 🌱</h2>
            <div class="count">${count}</div>

            <div class="actions">
              <button onClick=${decrement}>−</button>
              <button onClick=${increment}>+</button>
              <button onClick=${reset}>Reset</button>
            </div>
          </div>
        `;
      }

      function App() {
        return html`<${Counter} />`;
      }

      render(html`<${App} />`, document.body);
    </script>
  </body>
</html>
